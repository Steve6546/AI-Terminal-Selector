openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Agent Tool Chat API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: conversations
    description: Conversation management
  - name: mcpServers
    description: MCP Server management
  - name: mcpTools
    description: MCP Tool management
  - name: executions
    description: Tool execution tracking
  - name: settings
    description: Application settings
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /conversations:
    get:
      operationId: listConversations
      tags: [conversations]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"
    post:
      operationId: createConversation
      tags: [conversations]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /conversations/{id}:
    get:
      operationId: getConversation
      tags: [conversations]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteConversation
      tags: [conversations]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      operationId: updateConversation
      tags: [conversations]
      summary: Update a conversation (rename)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateConversationBody"
      responses:
        "200":
          description: Updated conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /conversations/{id}/auto-name:
    post:
      operationId: autoNameConversation
      tags: [conversations]
      summary: Auto-name a conversation using AI
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: force
          in: query
          required: false
          description: When true, renames even if the title was manually set. When false (default), only renames if the title is still a default placeholder.
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Generated title
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutoNameConversationResult"
        "404":
          description: Not found

  /conversations/{id}/pin:
    post:
      operationId: pinConversation
      tags: [conversations]
      summary: Pin a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pin result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PinConversationResult"

  /conversations/{id}/unpin:
    post:
      operationId: unpinConversation
      tags: [conversations]
      summary: Unpin a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Unpin result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PinConversationResult"

  /conversations/{id}/duplicate:
    post:
      operationId: duplicateConversation
      tags: [conversations]
      summary: Duplicate a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Duplicated conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DuplicateConversationResult"

  /conversations/{id}/export:
    get:
      operationId: exportConversation
      tags: [conversations]
      summary: Export a conversation as JSON or Markdown
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: format
          in: query
          schema:
            type: string
            enum: [json, markdown]
      responses:
        "200":
          description: Exported conversation file

  /conversations/{id}/messages:
    get:
      operationId: listMessages
      tags: [conversations]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"
    post:
      operationId: sendMessage
      tags: [conversations]
      summary: Send a message and receive an AI response (SSE stream)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "200":
          description: SSE stream of assistant response chunks
          content:
            text/event-stream: {}

  /conversations/{id}/messages-from/{messageId}:
    delete:
      operationId: truncateMessagesFrom
      tags: [conversations]
      summary: Delete all messages from a given message ID onward (inclusive)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Messages deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /mcp-servers:
    get:
      operationId: listMcpServers
      tags: [mcpServers]
      summary: List all MCP servers
      responses:
        "200":
          description: List of MCP servers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/McpServer"
    post:
      operationId: createMcpServer
      tags: [mcpServers]
      summary: Create a new MCP server
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMcpServerBody"
      responses:
        "201":
          description: Created MCP server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/McpServer"

  /mcp-servers/{id}:
    get:
      operationId: getMcpServer
      tags: [mcpServers]
      summary: Get a specific MCP server
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: MCP server details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/McpServer"
        "404":
          description: Not found
    patch:
      operationId: updateMcpServer
      tags: [mcpServers]
      summary: Update an MCP server
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMcpServerBody"
      responses:
        "200":
          description: Updated MCP server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/McpServer"
    delete:
      operationId: deleteMcpServer
      tags: [mcpServers]
      summary: Delete an MCP server
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /mcp-servers/{id}/test:
    post:
      operationId: testMcpServerConnection
      tags: [mcpServers]
      summary: Test MCP server connection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Connection test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/McpConnectionTestResult"

  /mcp-servers/{id}/discover:
    post:
      operationId: discoverMcpTools
      tags: [mcpServers]
      summary: Discover tools from an MCP server
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Discovered tools
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/McpTool"

  /mcp-servers/{id}/tools:
    get:
      operationId: listMcpTools
      tags: [mcpTools]
      summary: List tools for an MCP server
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of tools
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/McpTool"

  /mcp-servers/{id}/prompts:
    get:
      operationId: listMcpPrompts
      tags: [mcpTools]
      summary: List prompts discovered from an MCP server
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of prompts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/McpPrompt"

  /mcp-servers/{id}/resources:
    get:
      operationId: listMcpResources
      tags: [mcpTools]
      summary: List resources discovered from an MCP server
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of resources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/McpResource"

  /mcp-tools/{toolId}:
    patch:
      operationId: updateMcpTool
      tags: [mcpTools]
      summary: Update an MCP tool (enable/disable, require approval)
      parameters:
        - name: toolId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMcpToolBody"
      responses:
        "200":
          description: Updated tool
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/McpTool"

  /executions:
    get:
      operationId: listExecutions
      tags: [executions]
      summary: List recent executions
      parameters:
        - name: conversationId
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of executions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Execution"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get all settings
      responses:
        "200":
          description: Settings map
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingsMap"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsMap"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingsMap"

  /system/status:
    get:
      operationId: getSystemStatus
      tags: [health]
      summary: Get system status (connected servers, tools count, agent state)
      responses:
        "200":
          description: System status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemStatus"

  /system/status/events:
    get:
      operationId: getSystemStatusEvents
      tags: [health]
      summary: SSE stream of real-time MCP server health-check events
      description: |
        Server-Sent Events (SSE) stream that emits `server_status` events whenever the
        background health-check job updates an MCP server's connectivity status. A heartbeat
        comment is sent every 30 seconds to keep the connection alive.
        Each `server_status` event data is a JSON object with fields:
        - `serverId` (integer)
        - `name` (string)
        - `status` ("connected" | "error")
        - `lastCheckedAt` (ISO 8601 timestamp)
      responses:
        "200":
          description: SSE stream (text/event-stream)
          content:
            text/event-stream:
              schema:
                type: string
                description: Newline-delimited SSE events

  /executions/{executionId}/logs:
    get:
      operationId: listExecutionLogs
      tags: [executions]
      summary: List logs for a specific execution
      parameters:
        - name: executionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of execution log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExecutionLog"
        "404":
          description: Execution not found

  /execution-logs:
    get:
      operationId: listAllExecutionLogs
      tags: [executions]
      summary: List all execution logs with optional filters
      parameters:
        - name: level
          in: query
          schema:
            type: string
          description: Comma-separated log levels (info,warn,error,debug)
        - name: eventType
          in: query
          schema:
            type: string
          description: Comma-separated event types
        - name: serverId
          in: query
          schema:
            type: integer
          description: Filter by MCP server ID
        - name: after
          in: query
          schema:
            type: string
            format: date-time
          description: Return logs after this timestamp
        - name: before
          in: query
          schema:
            type: string
            format: date-time
          description: Return logs before this timestamp
        - name: limit
          in: query
          schema:
            type: integer
            default: 200
            maximum: 500
          description: Maximum number of results to return
      responses:
        "200":
          description: List of execution log entries with context
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExecutionLogExtended"

  /database-connections:
    get:
      operationId: listDatabaseConnections
      tags: [databases]
      summary: List all database connections
      responses:
        "200":
          description: List of database connections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DatabaseConnection"
    post:
      operationId: createDatabaseConnection
      tags: [databases]
      summary: Create a new database connection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDatabaseConnectionBody"
      responses:
        "200":
          description: Created database connection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatabaseConnection"

  /database-connections/{id}:
    patch:
      operationId: updateDatabaseConnection
      tags: [databases]
      summary: Update a database connection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDatabaseConnectionBody"
      responses:
        "200":
          description: Updated database connection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatabaseConnection"
        "404":
          description: Connection not found
    delete:
      operationId: deleteDatabaseConnection
      tags: [databases]
      summary: Delete a database connection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Connection not found

  /database-connections/{id}/test:
    post:
      operationId: testDatabaseConnection
      tags: [databases]
      summary: Test a database connection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatabaseConnectionTestResult"
        "404":
          description: Connection not found

  /attachments:
    get:
      operationId: listAttachments
      tags: [attachments]
      summary: List attachments, optionally filtered by conversation
      parameters:
        - name: conversationId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of attachments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Attachment"
    post:
      operationId: createAttachment
      tags: [attachments]
      summary: Create an attachment record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAttachmentBody"
      responses:
        "201":
          description: Created attachment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Attachment"

  /attachments/{id}:
    delete:
      operationId: deleteAttachment
      tags: [attachments]
      summary: Delete an attachment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Attachment not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Conversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        model:
          type: string
        pinnedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        messageCount:
          type: integer
      required:
        - id
        - title
        - model
        - createdAt
        - updatedAt

    AutoNameConversationResult:
      type: object
      properties:
        title:
          type: string
      required:
        - title

    PinConversationResult:
      type: object
      properties:
        id:
          type: integer
        pinnedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - pinnedAt

    DuplicateConversationResult:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        model:
          type: string
        pinnedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        messageCount:
          type: integer
      required:
        - id
        - title
        - model
        - createdAt
        - updatedAt
        - messageCount

    ChatMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        model:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt

    CreateConversationBody:
      type: object
      properties:
        title:
          type: string
        model:
          type: string
          default: claude-sonnet-4-6
      required:
        - title

    UpdateConversationBody:
      type: object
      properties:
        title:
          type: string
        model:
          type: string

    SendMessageBody:
      type: object
      properties:
        content:
          type: string
        model:
          type: string
      required:
        - content

    ConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        model:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
      required:
        - id
        - title
        - model
        - createdAt
        - updatedAt
        - messages

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    McpServer:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        transportType:
          type: string
          enum: [stdio, streamable-http]
        endpoint:
          type: string
        command:
          type: string
        args:
          type: array
          items:
            type: string
        authType:
          type: string
          enum: [none, bearer, api-key]
        timeout:
          type: integer
        retryCount:
          type: integer
        status:
          type: string
          enum: [connected, disconnected, checking, degraded, auth_required, error]
        enabled:
          type: boolean
        toolCount:
          type: integer
        latencyMs:
          type: integer
        lastErrorMessage:
          type: string
        lastSuccessAt:
          type: string
          format: date-time
        lastFailureAt:
          type: string
          format: date-time
        lastCheckedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - transportType
        - status
        - enabled
        - toolCount
        - createdAt

    CreateMcpServerBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        transportType:
          type: string
          enum: [stdio, streamable-http]
        endpoint:
          type: string
        command:
          type: string
        args:
          type: array
          items:
            type: string
        authType:
          type: string
          enum: [none, bearer, api-key]
        authSecret:
          type: string
        timeout:
          type: integer
          default: 30
        retryCount:
          type: integer
          default: 3
        enabled:
          type: boolean
          default: true
      required:
        - name
        - transportType

    UpdateMcpServerBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        transportType:
          type: string
          enum: [stdio, streamable-http]
        endpoint:
          type: string
        command:
          type: string
        args:
          type: array
          items:
            type: string
        authType:
          type: string
          enum: [none, bearer, api-key]
        authSecret:
          type: string
        timeout:
          type: integer
        retryCount:
          type: integer
        enabled:
          type: boolean

    McpConnectionTestResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        toolCount:
          type: integer
        latencyMs:
          type: integer
      required:
        - success
        - message

    McpTool:
      type: object
      properties:
        id:
          type: integer
        serverId:
          type: integer
        serverName:
          type: string
        toolName:
          type: string
        description:
          type: string
        inputSchema:
          type: object
        outputSchema:
          type: object
        enabled:
          type: boolean
        requiresApproval:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - serverId
        - toolName
        - enabled
        - requiresApproval
        - createdAt

    McpResource:
      type: object
      properties:
        id:
          type: integer
        serverId:
          type: integer
        resourceName:
          type: string
        description:
          type: string
        resourceType:
          type: string
        metadata:
          type: object
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - serverId
        - resourceName
        - resourceType
        - createdAt

    McpPrompt:
      type: object
      properties:
        id:
          type: integer
        serverId:
          type: integer
        promptName:
          type: string
        description:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - serverId
        - promptName
        - createdAt

    UpdateMcpToolBody:
      type: object
      properties:
        enabled:
          type: boolean
        requiresApproval:
          type: boolean

    Execution:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        serverId:
          type: integer
        serverName:
          type: string
        toolName:
          type: string
        status:
          type: string
          enum: [pending, running, success, error]
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        durationMs:
          type: integer
        resultSummary:
          type: string
        arguments:
          type: object
          additionalProperties: true
        rawResult:
          type: string
      required:
        - id
        - toolName
        - status
        - startedAt

    SettingsMap:
      type: object
      properties:
        agentName:
          type: string
        defaultModel:
          type: string
        systemPrompt:
          type: string
        autoRun:
          type: boolean
        maxToolCalls:
          type: integer
        maxExecutionTime:
          type: integer
        theme:
          type: string
          enum: [dark, light, system]
        language:
          type: string
        developerMode:
          type: boolean
        showTimeline:
          type: boolean
        showTechnicalDetails:
          type: boolean

    SystemStatus:
      type: object
      properties:
        connectedServers:
          type: integer
        disconnectedServers:
          type: integer
        totalTools:
          type: integer
        agentState:
          type: string
          enum: [idle, busy]
        activeExecutions:
          type: integer
      required:
        - connectedServers
        - disconnectedServers
        - totalTools
        - agentState
        - activeExecutions

    ExecutionLog:
      type: object
      properties:
        id:
          type: integer
        executionId:
          type: integer
        level:
          type: string
          enum: [debug, info, warn, error]
        eventType:
          type: string
        message:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - executionId
        - level
        - eventType
        - message
        - createdAt

    Attachment:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        fileName:
          type: string
        fileType:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - fileName
        - fileType
        - createdAt

    ExecutionLogExtended:
      type: object
      properties:
        id:
          type: integer
        executionId:
          type: integer
        level:
          type: string
        eventType:
          type: string
        message:
          type: string
        createdAt:
          type: string
          format: date-time
        toolName:
          type: string
          nullable: true
        executionStatus:
          type: string
          nullable: true
        serverId:
          type: integer
          nullable: true
        serverName:
          type: string
          nullable: true
      required:
        - id
        - executionId
        - level
        - message
        - createdAt

    DatabaseConnection:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [postgresql, mysql]
        host:
          type: string
        port:
          type: integer
        username:
          type: string
        database:
          type: string
        ssl:
          type: boolean
        status:
          type: string
          enum: [connected, disconnected, error]
        lastTestedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - type
        - database
        - status
        - createdAt

    CreateDatabaseConnectionBody:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [postgresql, mysql]
        host:
          type: string
        port:
          type: integer
        username:
          type: string
        password:
          type: string
        database:
          type: string
        ssl:
          type: boolean
          default: false
      required:
        - name
        - type
        - database

    UpdateDatabaseConnectionBody:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [postgresql, mysql]
        host:
          type: string
        port:
          type: integer
        username:
          type: string
        password:
          type: string
        database:
          type: string
        ssl:
          type: boolean

    DatabaseConnectionTestResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        latencyMs:
          type: integer
          nullable: true
      required:
        - success
        - message

    CreateAttachmentBody:
      type: object
      properties:
        conversationId:
          type: integer
        fileName:
          type: string
        fileType:
          type: string
        content:
          type: string
      required:
        - fileName
        - fileType
